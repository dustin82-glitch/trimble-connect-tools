<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://components.connect.trimble.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data: https:; frame-ancestors 'self' https://*.trimble.com https://*.trimblepaas.com; base-uri 'self'; object-src 'none'">
  <title>Trimble Connect Hello World</title>
  <!-- Load official Trimble Workspace API bundle -->
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <style>
    :root {
      --brand: #0070c0;
      --ink: #173047;
      --muted: #5d6f7e;
      --bg: #f4f8fb;
      --panel: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 0%, #e9f2fa 0%, var(--bg) 55%);
      color: var(--ink);
      padding: 24px;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid #d8e4ef;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(22, 60, 90, 0.08);
      padding: 22px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      color: var(--brand);
      letter-spacing: 0.2px;
    }
    p {
      margin: 8px 0;
      line-height: 1.45;
      color: var(--ink);
    }
    .status {
      margin-top: 14px;
      font-size: 13px;
      border-left: 4px solid var(--brand);
      background: #eef6fd;
      color: var(--muted);
      padding: 10px 12px;
      border-radius: 6px;
    }
    .meta {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .label {
      color: #44596b;
      font-weight: 600;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <img class="icon" src="./icon.svg" alt="Extension icon">
      <h1>Hello from Trimble Connect</h1>
    </div>
    <p>This is a minimal custom extension shell.</p>
    <p>If you can see this panel inside Trimble Connect, your manifest and hosting setup are working.</p>
    <div class="status" id="status">Connecting to Trimble Workspace API...</div>
    <div class="meta">
      <div><span class="label">Host:</span><span id="host">unknown</span></div>
      <div><span class="label">Project:</span><span id="project">unknown</span></div>
      <div><span class="label">User:</span><span id="user">unknown</span></div>
    </div>
  </div>

  <script>
    async function initExtension() {
      const statusEl = document.getElementById("status");
      const hostEl = document.getElementById("host");
      const projectEl = document.getElementById("project");
      const userEl = document.getElementById("user");

      if (!window.TrimbleConnectWorkspace || !window.TrimbleConnectWorkspace.connect) {
        statusEl.textContent = "Workspace API bundle not available";
        return;
      }

      try {
        const api = await window.TrimbleConnectWorkspace.connect(window.parent, (event, args) => {
          if (event === "extension.command") {
            console.log("extension.command", args);
          }
        }, 30000);

        try {
          await api.ui.setMenu({
            title: "Hello World",
            icon: "https://dustin82-glitch.github.io/trimble-connect-tools/icon.svg",
            command: "hello_world",
            subMenus: [{ title: "Home", command: "hello_world_home" }]
          });
          await api.ui.setActiveMenuItem("hello_world_home");
        } catch (menuError) {
          console.warn("Menu registration skipped:", menuError);
        }

        try {
          const host = await api.extension.getHost();
          hostEl.textContent = host && host.name ? host.name : "unknown";
        } catch {
          hostEl.textContent = "unknown";
        }

        try {
          const project = await api.project.getProject();
          projectEl.textContent = project && project.name ? project.name : "unknown";
        } catch {
          projectEl.textContent = "unknown";
        }

        try {
          const user = await api.user.getUser();
          userEl.textContent = user && user.email ? user.email : (user && user.name ? user.name : "unknown");
        } catch {
          userEl.textContent = "unknown";
        }

        statusEl.textContent = "Connected. Hello World extension is running.";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Could not connect to Trimble Workspace API.";
      }
    }

    initExtension();
  </script>
</body>
</html>
