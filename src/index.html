<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data: https:; frame-ancestors 'self' https://*.trimble.com https://*.trimblepaas.com; base-uri 'self'; object-src 'none'">
  <title>Trimble Connect Markup Tools</title>
  <script src="https://cdn.jsdelivr.net/npm/trimble-connect-workspace-api@1/dist/index.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --brand: #0b63ce;
      --brand-hover: #084ea3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 14px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    .panel {
      display: grid;
      gap: 12px;
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 6px 14px rgba(17, 24, 39, 0.06);
    }

    .title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--brand);
    }

    .meta {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 85px 1fr;
      gap: 6px 8px;
      font-size: 12px;
    }

    .meta-label {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .row {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 7px;
      border: 1px solid var(--line);
      padding: 9px 10px;
      font-size: 13px;
      background: #fff;
      color: var(--text);
    }

    button {
      border: none;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background 160ms ease;
    }

    button:hover:enabled { background: var(--brand-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      font-size: 12px;
      color: var(--text);
      background: #eef4ff;
      border: 1px solid #c9dcff;
      border-radius: 7px;
      padding: 9px;
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    .debug-list {
      margin: 8px 0 0;
      padding-left: 18px;
      font-size: 12px;
      max-height: 220px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <main class="panel">
    <section class="card">
      <h1 class="title">Trimble Connect Markup Tools</h1>
      <div class="meta">
        <div class="meta-label">Host</div>
        <div id="host">-</div>
        <div class="meta-label">Project</div>
        <div id="project">-</div>
        <div class="meta-label">User</div>
        <div id="user">-</div>
      </div>
      <div id="status" class="status" aria-live="polite">Initializing...</div>
    </section>

    <section class="card">
      <h2 class="title">Property Labels</h2>
      <div class="row">
        <label for="propertyName">Property Name</label>
        <select id="propertyName" disabled>
          <option value="">Select parts and refresh properties</option>
        </select>
      </div>
      <div class="actions">
        <button id="refreshPropertiesBtn" disabled>Refresh Properties</button>
        <button id="applyPropertyBtn" disabled>Apply Value Pins</button>
      </div>
    </section>

    <section class="card">
      <h2 class="title">AssemblyMark and Filters</h2>
      <div class="row">
        <label for="filterPropertyName">Filter Property</label>
        <select id="filterPropertyName" disabled>
          <option value="">Select parts and refresh properties</option>
        </select>
      </div>
      <div class="row">
        <label for="propertyMatchValue">Filter Match Value</label>
        <input id="propertyMatchValue" type="text" placeholder="Enter value to match" disabled>
      </div>
      <div class="actions">
        <button id="addAssemblyMarkCogBtn" disabled>Add AssemblyMark @ COG</button>
        <button id="addFilteredLabelsBtn" disabled>Add Filtered Labels</button>
        <button id="addHelloWorldBtn" disabled>Add Hello World Test</button>
        <button id="debugBboxCogBtn" disabled>Debug Raw BBox + COG</button>
      </div>
    </section>

    <section class="card">
      <h2 class="title">Debug</h2>
      <div id="debugSummary" class="status">Waiting for selection...</div>
      <ul id="debugList" class="debug-list"></ul>
    </section>
  </main>

  <script src="./app.js?v=20260712-45"></script>
</body>
</html>
